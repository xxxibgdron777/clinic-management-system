{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6">
<div class="card"><div class="card-header">{{ title }}</div>
<div class="card-body">
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">归属项目 *</label>
        <select name="project" class="form-select" required>
            <option value="">请选择</option>
            {% for p in projects %}<option value="{{ p.pk }}">{{ p }}</option>{% endfor %}
        </select></div>
    <div class="mb-3"><label class="form-label">费用科目 *</label>
        <select name="category" class="form-select" required>
            <option value="">请选择</option>
            {% for c in categories %}<option value="{{ c.pk }}">{{ c.name }}</option>{% endfor %}
        </select></div>
    <div class="mb-3"><label class="form-label">金额 *</label>
        <input type="number" step="0.01" name="amount" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">发生日期 *</label>
        <input type="date" name="cost_date" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">备注</label>
        <textarea name="notes" class="form-control" rows="2"></textarea></div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{% url 'projects:manual_cost_list' %}" class="btn btn-outline-secondary">取消</a>
</form>
</div></div>
</div></div>
{% endblock %}
