<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 诊所管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; border: 1px solid #e2e8f0; border-radius: 0.8rem; box-shadow: 0 4px 24px rgba(0,0,0,0.08); background: #fff; }
        .login-header { padding: 2rem 2rem 0.5rem; text-align: center; }
        .login-header i { font-size: 2.5rem; color: #2563eb; }
        .login-header h4 { margin: 0.75rem 0 0.25rem; font-weight: 700; color: #1e293b; }
        .login-body { padding: 1rem 2rem 2rem; }
        .btn-login { background: #2563eb; border-color: #2563eb; padding: 0.6rem; font-weight: 600; }
        .btn-login:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-heart-pulse"></i>
            <h4>诊所管理系统</h4>
            <p class="text-muted small mb-0">请登录以继续</p>
        </div>
        <div class="login-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small">用户名</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small">密码</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                {% if form.errors %}
                <div class="alert alert-danger py-2 small">用户名或密码错误</div>
                {% endif %}
                <button type="submit" class="btn btn-login w-100 text-white mt-2">登录</button>
            </form>
        </div>
    </div>
</body>
</html>
