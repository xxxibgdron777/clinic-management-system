{% extends 'base.html' %}
{% block content %}<div class="card"><div class="card-header">合作实验室</div><div class="card-body p-0">
<table class="table table-hover"><thead><tr><th>名称</th><th>简称</th><th>联系人</th><th>电话</th><th>状态</th></tr></thead>
<tbody>{% for p in partners %}<tr><td>{{ p.name }}</td><td>{{ p.short_name }}</td>
<td>{{ p.contact_person|default:'-' }}</td><td>{{ p.contact_phone|default:'-' }}</td>
<td>{% if p.is_active %}<span class="badge bg-success">启用</span>{% else %}<span class="badge bg-secondary">停用</span>{% endif %}</td></tr>
{% empty %}<tr><td colspan="5" class="empty-state"><i class="bi bi-building"></i>暂无合作实验室</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
