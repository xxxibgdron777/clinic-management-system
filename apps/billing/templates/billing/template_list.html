{% extends 'base.html' %}
{% block content %}<div class="card"><div class="card-header">账单模板</div><div class="card-body p-0"><table class="table table-hover"><thead><tr><th>名称</th><th>说明</th><th>适用合作方</th><th>状态</th></tr></thead>
<tbody>{% for t in templates %}<tr><td>{{ t.name }}</td><td>{{ t.description|default:'-' }}</td>
<td>{{ t.partner_type|default:'-' }}</td><td>{% if t.is_active %}<span class="badge bg-success">启用</span>{% else %}<span class="badge bg-secondary">停用</span>{% endif %}</td></tr>
{% empty %}<tr><td colspan="4" class="empty-state"><i class="bi bi-file-earmark-text"></i>暂无模板，请在后台管理中添加</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
