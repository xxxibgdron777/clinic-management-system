{% extends 'base.html' %}
{% block content %}<div class="card"><div class="card-header d-flex justify-content-between align-items-center">
<span>收款记录</span><a href="{% url 'vip:payment_create' %}" class="btn btn-sm btn-primary"><i class="bi bi-plus-lg"></i> 新增收款</a></div>
<div class="card-body p-0"><table class="table table-hover"><thead><tr><th>会员</th><th>疗程</th><th>金额</th><th>日期</th><th>项目类型</th></tr></thead>
<tbody>{% for p in payments %}<tr><td>{{ p.member.name }}</td><td>{{ p.course|default:'-' }}</td><td class="fw-medium text-end">{{ p.amount|floatformat:0 }}</td>
<td class="small">{{ p.payment_date|date:'Y-m-d' }}</td><td>{{ p.project_type }}</td></tr>
{% empty %}<tr><td colspan="5" class="empty-state"><i class="bi bi-wallet2"></i>暂无收款记录</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
