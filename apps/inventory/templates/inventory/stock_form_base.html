{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
<div class="card"><div class="card-header">{{ title }}</div>
<div class="card-body"><form method="post">{% csrf_token %}{{ form|crispy }}
<div class="d-flex gap-2 mt-3"><button type="submit" class="btn btn-primary">提交</button><a href="javascript:history.back()" class="btn btn-outline-secondary">取消</a></div>
</form></div></div></div></div>
{% endblock %}
